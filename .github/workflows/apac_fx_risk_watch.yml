name: APAC FX Risk Watch

on:
  schedule:
    # Daily, weekdays only, 06:00 UTC (after most Asian markets close, ahead
    # of the European open). Skipping weekends avoids wasted runs since FX
    # reference rates barely move and most central banks don't communicate
    # on Sat/Sun.
    - cron: "0 6 * * 1-5"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run in test mode (reduced scope, quick checks)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run APAC FX risk watch agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python apac_fx_risk_agent.py --test
          else
            python apac_fx_risk_agent.py
          fi

      - name: Upload generated reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: apac-fx-risk-reports-${{ github.run_id }}
          path: reports/*.html
          retention-days: 90

      - name: Commit reports and state back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: APAC FX risk report for $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
